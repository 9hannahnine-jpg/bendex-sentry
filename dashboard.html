<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bendex Sentry</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#161616;
  --border:#222;--border2:#2a2a2a;
  --text:#e0e0e0;--text2:#888;--text3:#555;
  --accent:#00ff88;--accent2:#00cc66;
  --warn:#ffaa00;--danger:#ff3344;--info:#0088ff;
  --p0:#ff3344;--p1:#ff6600;--p2:#ffaa00;--p3:#00ff88;
}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;line-height:1.5;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:100;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;letter-spacing:0.05em;}
.logo span{color:var(--accent);}
.header-meta{display:flex;align-items:center;gap:24px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.version-tag{background:var(--bg3);border:1px solid var(--border2);padding:3px 8px;font-size:10px;color:var(--text3);}
.layout{display:flex;height:calc(100vh - 49px);}
.sidebar{width:260px;min-width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center;}
.refresh-btn{background:none;border:1px solid var(--border2);color:var(--text3);cursor:pointer;font-size:11px;padding:2px 6px;}
.refresh-btn:hover{color:var(--accent);border-color:var(--accent);}
.deployment-list{overflow-y:auto;flex:1;}
.deployment-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;}
.deployment-item:hover{background:var(--bg3);}
.deployment-item.active{background:var(--bg3);border-left:2px solid var(--accent);}
.dep-name{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--text);margin-bottom:4px;}
.dep-meta{display:flex;gap:8px;align-items:center;}
.status-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;padding:2px 6px;text-transform:uppercase;}
.status-stable{color:var(--accent);background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.2);}
.status-drift{color:var(--danger);background:rgba(255,51,68,0.08);border:1px solid rgba(255,51,68,0.2);}
.status-elevated{color:var(--warn);background:rgba(255,170,0,0.08);border:1px solid rgba(255,170,0,0.2);}
.status-warmup{color:var(--info);background:rgba(0,136,255,0.08);border:1px solid rgba(0,136,255,0.2);}
.status-quarantine{color:var(--warn);background:rgba(255,170,0,0.08);border:1px solid rgba(255,170,0,0.2);}
.status-recovered{color:var(--accent);background:rgba(0,255,136,0.08);border:1px solid rgba(0,255,136,0.2);}
.dep-requests{font-size:10px;color:var(--text3);}
.main{flex:1;overflow-y:auto;padding:24px;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:12px;gap:12px;}
.card{background:var(--bg2);border:1px solid var(--border);margin-bottom:16px;}
.card-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.card-title{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);}
.card-body{padding:16px;}
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:16px;}
.metric{background:var(--bg2);padding:16px;text-align:center;}
.metric-value{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;line-height:1;margin-bottom:6px;}
.metric-value.danger{color:var(--danger);}
.metric-value.warn{color:var(--warn);}
.metric-value.ok{color:var(--accent);}
.metric-label{font-size:10px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;}
.cusum-bar-wrap{background:var(--bg3);height:8px;border:1px solid var(--border2);margin:12px 0 4px;}
.cusum-bar{height:100%;background:var(--accent);transition:width 0.5s;}
.cusum-bar.danger{background:var(--danger);}
.cusum-bar.warn{background:var(--warn);}
.cusum-labels{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);}
.alert-item{padding:12px;border:1px solid var(--border2);margin-bottom:8px;background:var(--bg3);display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start;}
.alert-tier{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:3px 8px;text-align:center;}
.tier-P0{background:rgba(255,51,68,0.15);color:var(--p0);border:1px solid var(--p0);}
.tier-P1{background:rgba(255,102,0,0.15);color:var(--p1);border:1px solid var(--p1);}
.tier-P2{background:rgba(255,170,0,0.15);color:var(--p2);border:1px solid var(--p2);}
.tier-P3{background:rgba(0,255,136,0.15);color:var(--p3);border:1px solid var(--p3);}
.alert-type{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px;}
.alert-explain{color:var(--text2);font-size:11px;}
.alert-time{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);white-space:nowrap;}
.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.compare-input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;width:100%;}
.compare-input:focus{outline:none;border-color:var(--accent);}
.compare-btn{background:var(--accent);color:var(--bg);border:none;padding:8px 20px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;}
.compare-btn:hover{background:var(--accent2);}
.compare-result{background:var(--bg3);border:1px solid var(--border2);padding:16px;font-family:'IBM Plex Mono',monospace;font-size:12px;}
.compare-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);}
.compare-row:last-child{border-bottom:none;}
.compare-key{color:var(--text3);}
.compare-val{color:var(--text);}
.compare-val.p0{color:var(--p0);}
.compare-val.p1{color:var(--p1);}
.compare-val.p2{color:var(--p2);}
.compare-val.p3{color:var(--p3);}
.versions-table{width:100%;border-collapse:collapse;}
.versions-table th{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
.versions-table td{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text2);}
.versions-table tr:hover td{background:var(--bg3);cursor:pointer;}
.token-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.token-chip{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;border:1px solid var(--border2);color:var(--text2);}
.token-chip.gained{color:var(--accent);border-color:rgba(0,255,136,0.3);}
.token-chip.lost{color:var(--danger);border-color:rgba(255,51,68,0.3);}
.no-data{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);padding:20px;text-align:center;}
.snr-bar-wrap{height:4px;background:var(--border2);margin-top:8px;}
.snr-bar{height:100%;background:var(--accent);transition:width 0.5s;}
.chart-wrap{position:relative;height:140px;width:100%;}
.eval-bar-wrap{background:var(--bg3);height:6px;border:1px solid var(--border2);flex:1;margin:0 8px;}
.eval-bar{height:100%;transition:width 0.5s;}
.eval-row{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:11px;}
.eval-row:last-child{border-bottom:none;}
.eval-name{color:var(--text2);width:180px;flex-shrink:0;}
.eval-pct{width:44px;text-align:right;flex-shrink:0;}
.eval-checks{color:var(--text3);font-size:10px;width:60px;text-align:right;flex-shrink:0;}
.eval-failure{font-size:10px;color:var(--danger);padding:2px 0 2px 188px;font-family:'IBM Plex Mono',monospace;}
.trace-table{width:100%;border-collapse:collapse;font-family:"IBM Plex Mono",monospace;font-size:11px;}
.trace-table th{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);}
.trace-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:top;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.trace-table tr:hover td{background:var(--bg3);}
.trace-drift-stable{color:var(--accent);}
.trace-drift-DRIFT{color:var(--danger);}
.trace-drift-elevated{color:var(--warn);}
.trace-drift-warmup{color:var(--info);}
.trace-drift-quarantine{color:var(--warn);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);}
</style>
</head>
<body>
<header>
  <div class="logo">BENDEX<span>.</span>SENTRY</div>
  <div class="header-meta">
    <span><span class="status-dot"></span><span id="upstream-url">connecting...</span></span>
    <span class="version-tag">v3.1.0.0</span>
    <span id="header-time"></span>
  </div>
</header>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span>Deployments</span>
      <button class="refresh-btn" onclick="loadDeployments()">↻</button>
    </div>
    <div class="deployment-list" id="deployment-list">
      <div class="no-data">Loading...</div>
    </div>
  </aside>
  <main class="main" id="main-panel">
    <div class="empty-state">
      <div style="font-size:32px;opacity:0.2;">◈</div>
      <div>Select a deployment</div>
      <div style="font-size:10px;color:var(--text3);margin-top:4px;">Send traffic through Sentry to see deployments appear</div>
    </div>
  </main>
</div>
<script>
const API = '__SENTRY_BASE_URL__';
let selectedDep=null, selectedVersion='default', refreshTimer=null;

function updateTime(){
  const el=document.getElementById('header-time');
  if(el) el.textContent=new Date().toISOString().replace('T',' ').substring(0,19)+' UTC';
}
setInterval(updateTime,1000); updateTime();

async function loadHealth(){
  try{
    const r=await fetch(API+'/sentry/health');
    const d=await r.json();
    const el=document.getElementById('upstream-url');
    if(el) el.textContent=d.upstream||'—';
  }catch(e){
    const el=document.getElementById('upstream-url');
    if(el) el.textContent='error: '+e.message;
  }
}

async function loadDeployments(){
  try{
    const r=await fetch(API+'/sentry/deployments');
    const d=await r.json();
    const list=document.getElementById('deployment-list');
    if(!d.deployments||d.deployments.length===0){
      list.innerHTML='<div class="no-data">No deployments yet.<br/>Send traffic through Sentry to begin.</div>';
      return;
    }
    list.innerHTML=d.deployments.map(dep=>`
      <div class="deployment-item ${selectedDep===dep.deployment_id?'active':''}"
           onclick="selectDeployment('${dep.deployment_id}','${dep.model_version||'default'}',event)">
        <div class="dep-name">${dep.deployment_id}</div>
        <div class="dep-meta">
          <span class="status-badge status-${(dep.status||'warmup').toLowerCase()}">${dep.status||'warmup'}</span>
          <span class="dep-requests">${dep.requests||0} req</span>
        </div>
        ${dep.model_version&&dep.model_version!=='default'?`<div style="font-family:monospace;font-size:10px;color:var(--text3);margin-top:3px;">${dep.model_version}</div>`:''}
      </div>`).join('');
  }catch(e){
    document.getElementById('deployment-list').innerHTML='<div class="no-data" style="color:var(--danger);">Error: '+e.message+'</div>';
  }
}

function selectDeployment(did,version,e){
  selectedDep=did; selectedVersion=version||'default';
  document.querySelectorAll('.deployment-item').forEach(el=>el.classList.remove('active'));
  if(e&&e.currentTarget) e.currentTarget.classList.add('active');
  if(refreshTimer) clearInterval(refreshTimer);
  loadDeploymentDetail();
  refreshTimer=setInterval(loadDeploymentDetail,5000);
}

async function safeJson(r){try{return await r.json();}catch(e){return {};}}

async function loadDeploymentDetail(){
  if(!selectedDep) return;
  try{
    const [r,rv,rc,re]=await Promise.all([
      fetch(API+'/sentry/deployments/'+selectedDep+'?model_version='+selectedVersion),
      fetch(API+'/sentry/deployments/'+selectedDep+'/versions'),
      fetch(API+'/sentry/deployments/'+selectedDep+'/cost?model_version='+selectedVersion),
      fetch(API+'/sentry/deployments/'+selectedDep+'/evals?model_version='+selectedVersion),
    ]);
    const d=await safeJson(r);
    const vd=await safeJson(rv);
    const cd=await safeJson(rc);
    const ed=await safeJson(re);
    if(!d.deployment_id) return;
    renderDetail(d,vd.versions||[],cd.cost||{},ed.evals||[]);
    refreshTraces();
    refreshCharts();
  }catch(e){console.error('loadDeploymentDetail:',e);}
}

function fmtTime(ts){if(!ts)return'—';return new Date(ts*1000).toISOString().replace('T',' ').substring(0,19);}
function cusumPct(v,l){if(!l||!v)return 0;return Math.min((v/l)*100,100);}
function tierCls(t){return(t||'p3').toLowerCase();}

async function loadTracesCard(did,version){
  try{
    const r=await fetch(API+'/sentry/deployments/'+did+'/traces?model_version='+version+'&limit=20');
    const d=await r.json();
    const traces=d.traces||[];
    if(!traces.length) return '<div class="no-data">No traces yet</div>';
    const rows=traces.map(t=>{
      const driftCls='trace-drift-'+(t.drift_status||'warmup');
      const fz=t.fr_z!=null?t.fr_z.toFixed(3):'—';
      const cost=t.cost_usd?'$'+t.cost_usd.toFixed(6):'—';
      const lat=t.latency_ms?t.latency_ms.toFixed(0)+'ms':'—';
      const prompt=(t.prompt||'').substring(0,60).replace(/</g,'&lt;');
      const response=(t.response||'').substring(0,60).replace(/</g,'&lt;');
      return '<tr>'+
        '<td title="'+prompt+'">'+prompt+'</td>'+
        '<td title="'+response+'">'+response+'</td>'+
        '<td class="'+driftCls+'">'+(t.drift_status||'—')+'</td>'+
        '<td>'+fz+'</td>'+
        '<td>'+lat+'</td>'+
        '<td>'+cost+'</td>'+
        '<td>'+fmtTime(t.timestamp)+'</td>'+
        '</tr>';
    }).join('');
    return '<table class="trace-table">'+
      '<thead><tr><th>Prompt</th><th>Response</th><th>Status</th>'+
      '<th>FR-z</th><th>Latency</th><th>Cost</th><th>Time</th>'+
      '</tr></thead><tbody>'+rows+'</tbody></table>';
  }catch(e){return '<div class="no-data">Error loading traces</div>';}
}

function buildEvalCard(evals){
  const rows=evals.map(e=>{
    const rate=e.pass_rate!=null?e.pass_rate:1.0;
    const pct=Math.round(rate*100);
    const color=pct===100?'var(--accent)':pct>=90?'var(--warn)':'var(--danger)';
    const failures=(e.failures||[]).map(f=>
      '<div class="eval-failure">\u2717 '+f.reason+'</div>'
    ).join('');
    return '<div class="eval-row">'+
      '<span class="eval-name">'+e.name+'</span>'+
      '<div class="eval-bar-wrap"><div class="eval-bar" style="width:'+pct+'%;background:'+color+'"></div></div>'+
      '<span class="eval-pct" style="color:'+color+'">'+pct+'%</span>'+
      '<span class="eval-checks">'+e.total+' checks</span>'+
      '</div>'+failures;
  }).join('');
  return '<div class="card">'+
    '<div class="card-header">'+
    '<span class="card-title">Eval Assertions</span>'+
    '<span style="font-family:monospace;font-size:10px;color:var(--text3);">'+evals.length+' assertions</span>'+
    '</div>'+
    '<div class="card-body" style="padding:8px 16px;">'+rows+'</div>'+
    '</div>';
}

async function refreshTraces(){
  if(!selectedDep) return;
  const el=document.getElementById('traces-body');
  if(!el) return;
  el.innerHTML=await loadTracesCard(selectedDep,selectedVersion);
}

async function refreshCharts(){
  if(!selectedDep) return;
  const container=document.getElementById('charts-container');
  if(!container) return;
  try{
    const r=await fetch(API+'/sentry/deployments/'+selectedDep+'/traces?model_version='+selectedVersion+'&limit=100');
    const d=await r.json();
    const traces=(d.traces||[]).reverse();
    if(traces.length<2){container.innerHTML='';return;}
    container.innerHTML='<div class="card">'+
      '<div class="card-header"><span class="card-title">Time Series</span>'+
      '<span style="font-family:monospace;font-size:10px;color:var(--text3);">'+traces.length+' requests</span></div>'+
      '<div class="card-body">'+
        '<div style="font-size:10px;color:var(--text3);margin-bottom:6px;font-family:monospace;letter-spacing:0.08em;">FR-Z SCORE</div>'+
        '<div class="chart-wrap"><canvas id="chart-frz"></canvas></div>'+
        '<div style="font-size:10px;color:var(--text3);margin:14px 0 6px;font-family:monospace;letter-spacing:0.08em;">LATENCY (ms)</div>'+
        '<div class="chart-wrap"><canvas id="chart-lat"></canvas></div>'+
      '</div></div>';
    const labels=traces.map((_,i)=>i+1);
    const mkChart=(id,data,color)=>new Chart(document.getElementById(id),{
      type:'line',
      data:{labels,datasets:[{data,borderColor:color,backgroundColor:'transparent',
        borderWidth:1.5,pointRadius:0,tension:0.3}]},
      options:{responsive:true,maintainAspectRatio:false,animation:false,
        plugins:{legend:{display:false}},
        scales:{x:{display:false,grid:{display:false}},
          y:{display:true,grid:{color:'rgba(255,255,255,0.04)'},
            ticks:{color:'#555',font:{size:9},maxTicksLimit:4}}}}
    });
    mkChart('chart-frz',traces.map(t=>t.fr_z||0),'#00ff88');
    mkChart('chart-lat',traces.map(t=>t.latency_ms||0),'#0088ff');
  }catch(e){console.error('chart error:',e);}
}

function switchVersion(v){selectedVersion=v;loadDeploymentDetail();}

function renderDetail(d,versions,cost,evals){
  cost=cost||{};
  const sv=d.severity||{};
  const ex=d.explanation||{};
  const cusum=d.cusum_current||0;
  const lambda=d.cusum_lambda||1;
  const pct=cusumPct(cusum,lambda);
  const cClass=pct>90?'danger':pct>60?'warn':'';
  const sCls=d.status==='DRIFT'?'danger':d.status==='elevated'?'warn':d.status==='stable'?'ok':'';
  const gained=(ex.gained||[]).slice(0,5);
  const lost=(ex.lost||[]).slice(0,5);
  const alerts=d.drift_history||[];
  const hall=d.hallucination_score||0;
  const hallCls=hall>0.5?'danger':hall>0.25?'warn':'ok';
  const totalCost=cost.total_cost_usd!=null?'$'+cost.total_cost_usd.toFixed(4):'—';
  const avgLat=cost.avg_latency_ms?cost.avg_latency_ms.toFixed(0)+'ms':'—';
  const totalTok=cost.total_tokens?cost.total_tokens.toLocaleString():'—';

  document.getElementById('main-panel').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div>
        <div style="font-family:IBM Plex Mono,monospace;font-size:18px;font-weight:600;">${d.deployment_id}</div>
        <div style="font-family:IBM Plex Mono,monospace;font-size:11px;color:var(--text3);margin-top:4px;">
          ${d.model_version||'default'} &middot; ${d.requests||0} requests &middot;
          ${d.warmup_complete?'<span style="color:var(--accent)">monitoring active</span>':'<span style="color:var(--info)">warming up</span>'}
        </div>
      </div>
      <span class="status-badge status-${(d.status||'warmup').toLowerCase()}" style="font-size:13px;padding:6px 14px;">${(d.status||'WARMUP').toUpperCase()}</span>
    </div>

    <div class="metrics-grid">
      <div class="metric"><div class="metric-value ${sCls}">${(d.status||'—').toUpperCase()}</div><div class="metric-label">Status</div></div>
      <div class="metric"><div class="metric-value">${d.alerts||0}</div><div class="metric-label">Alerts</div></div>
      <div class="metric"><div class="metric-value">${cusum.toFixed(3)}</div><div class="metric-label">CUSUM</div></div>
      <div class="metric"><div class="metric-value">${d.recal_count||0}</div><div class="metric-label">Recalibrations</div></div>
    </div>

    <div class="metrics-grid" style="margin-bottom:16px;">
      <div class="metric"><div class="metric-value">${totalCost}</div><div class="metric-label">Total Cost</div></div>
      <div class="metric"><div class="metric-value">${avgLat}</div><div class="metric-label">Avg Latency</div></div>
      <div class="metric"><div class="metric-value">${totalTok}</div><div class="metric-label">Total Tokens</div></div>
      <div class="metric"><div class="metric-value ${hallCls}">${(hall*100).toFixed(1)}%</div><div class="metric-label">Hallucination Score</div></div>
    </div>

    <div id="charts-container"></div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">CUSUM / Detection Threshold</span>
        <span style="font-family:monospace;font-size:10px;color:var(--text3);">λ=${lambda?lambda.toFixed(4):'—'}</span>
      </div>
      <div class="card-body">
        <div class="cusum-bar-wrap"><div class="cusum-bar ${cClass}" style="width:${pct}%"></div></div>
        <div class="cusum-labels"><span>0</span><span>${cusum.toFixed(3)} / ${lambda?lambda.toFixed(3):'—'}</span><span>${pct.toFixed(0)}%</span></div>
        ${d.drift_type?`<div style="margin-top:12px;display:flex;gap:12px;align-items:center;">
          <span style="font-family:monospace;font-size:11px;color:var(--text3);">Drift type:</span>
          <span style="font-family:monospace;font-size:12px;font-weight:600;color:var(--warn);">${d.drift_type}</span>
          ${sv.tier?`<span class="alert-tier tier-${sv.tier}">${sv.tier}</span>`:''}
        </div>`:''}
        ${ex.summary&&ex.summary!=='insufficient data'?`
          <div style="margin-top:10px;font-size:11px;color:var(--text2);">${ex.summary}</div>
          <div class="token-chips">
            ${gained.map(g=>`<span class="token-chip gained">+${g.token} <span style="opacity:0.6">${g.ratio}x</span></span>`).join('')}
            ${lost.map(l=>`<span class="token-chip lost">-${l.token}</span>`).join('')}
          </div>`:''}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Version Regression Compare</span></div>
      <div class="card-body">
        <div class="compare-grid">
          <div>
            <div style="font-size:10px;color:var(--text3);margin-bottom:6px;font-family:monospace;">FROM VERSION</div>
            <input class="compare-input" id="cmp-from" placeholder="e.g. claude-sonnet-4-6"/>
          </div>
          <div>
            <div style="font-size:10px;color:var(--text3);margin-bottom:6px;font-family:monospace;">TO VERSION</div>
            <input class="compare-input" id="cmp-to" placeholder="e.g. claude-opus-4-6"/>
          </div>
        </div>
        <button class="compare-btn" onclick="runCompare()">RUN COMPARISON →</button>
        <div id="compare-result" style="margin-top:12px;"></div>
      </div>
    </div>

    ${versions.length>0?`
    <div class="card">
      <div class="card-header"><span class="card-title">Versions Tracked</span></div>
      <div class="card-body" style="padding:0;">
        <table class="versions-table">
          <thead><tr><th>Version</th><th>Status</th><th>Requests</th><th>Warmup</th><th>Last seen</th></tr></thead>
          <tbody>${versions.map(v=>`
            <tr onclick="switchVersion('${v.model_version}')">
              <td style="color:var(--text);font-weight:500;">${v.model_version}</td>
              <td><span class="status-badge status-${(v.status||'warmup').toLowerCase()}">${v.status||'—'}</span></td>
              <td>${v.requests||0}</td>
              <td>${v.warmup_complete?'<span style="color:var(--accent)">✓</span>':'<span style="color:var(--text3)">—</span>'}</td>
              <td>${fmtTime(v.last_seen)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`:''}

    ${evals&&evals.length>0?buildEvalCard(evals):''}

    <div class="card" id="traces-card">
      <div class="card-header">
        <span class="card-title">Recent Traces</span>
        <span style="font-family:monospace;font-size:10px;color:var(--text3);">last 20 requests</span>
      </div>
      <div class="card-body" style="padding:0;overflow-x:auto;" id="traces-body">
        <div class="no-data">Loading...</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title">Alert History</span>
        <span style="font-family:monospace;font-size:10px;color:var(--text3);">${alerts.length} events</span>
      </div>
      <div class="card-body">
        ${alerts.length===0?'<div class="no-data">No alerts yet</div>':
          alerts.map(a=>`<div class="alert-item">
            <span class="alert-tier tier-${a.severity_tier||'P3'}">${a.severity_tier||'?'}</span>
            <div>
              <div class="alert-type">${a.drift_type||'UNKNOWN'}</div>
              <div class="alert-explain">step ${a.detect_step||'?'} &middot; score ${a.severity_score||'—'}</div>
            </div>
            <div class="alert-time">${fmtTime(a.timestamp)}</div>
          </div>`).join('')}
      </div>
    </div>
  `;
}

async function runCompare(){
  const from=document.getElementById('cmp-from').value.trim();
  const to=document.getElementById('cmp-to').value.trim();
  if(!from||!to) return;
  const el=document.getElementById('compare-result');
  el.innerHTML='<div class="no-data">Running...</div>';
  try{
    const r=await fetch(API+'/sentry/deployments/'+selectedDep+'/compare?version_from='+from+'&version_to='+to);
    const d=await r.json();
    if(d.error){el.innerHTML=`<div class="no-data" style="color:var(--danger);">${d.error}</div>`;return;}
    const sv=d.severity||{};
    const ex=d.explanation||{};
    const snrPct=Math.min(((sv.signal_noise_ratio||0)/4)*100,100);
    const tc=tierCls(sv.tier);
    el.innerHTML=`<div class="compare-result">
      <div class="compare-row"><span class="compare-key">FR distance</span><span class="compare-val">${d.fr_distance}</span></div>
      <div class="compare-row"><span class="compare-key">Noise floor (τ*)</span><span class="compare-val">${sv.noise_floor||'—'}</span></div>
      <div class="compare-row"><span class="compare-key">Signal/noise</span><span class="compare-val ${tc}">${sv.signal_noise_ratio||'—'}x</span></div>
      <div class="compare-row"><span class="compare-key">Severity</span><span class="compare-val ${tc}">${sv.tier||'—'} — ${sv.action||'—'}</span></div>
      <div class="compare-row"><span class="compare-key">Drift type</span><span class="compare-val">${d.drift_type||'—'}</span></div>
      <div class="compare-row" style="border:none;"><span class="compare-key">Interpretation</span><span class="compare-val" style="max-width:260px;text-align:right;font-size:10px;">${d.interpretation||'—'}</span></div>
      ${(ex.gained||[]).length||(ex.lost||[]).length?`
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
          <div style="font-size:10px;color:var(--text3);margin-bottom:6px;">TOKEN SHIFT</div>
          <div class="token-chips">
            ${(ex.gained||[]).slice(0,4).map(g=>`<span class="token-chip gained">+${g.token}</span>`).join('')}
            ${(ex.lost||[]).slice(0,4).map(l=>`<span class="token-chip lost">-${l.token}</span>`).join('')}
          </div>
        </div>`:''}
      <div class="snr-bar-wrap" style="margin-top:12px;"><div class="snr-bar" style="width:${snrPct}%"></div></div>
      <div style="font-family:monospace;font-size:9px;color:var(--text3);margin-top:3px;">SNR: ${sv.signal_noise_ratio||0}x above noise floor</div>
    </div>`;
  }catch(e){el.innerHTML=`<div class="no-data" style="color:var(--danger);">Error: ${e.message}</div>`;}
}

loadHealth();
loadDeployments();
setInterval(loadDeployments,10000);
</script>
</body>
</html>
