<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bendex Theory Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#161616;
  --border:#222;--border2:#2a2a2a;
  --text:#e0e0e0;--text2:#888;--text3:#555;
  --accent:#00ff88;--accent2:#00cc66;
}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;}
header{padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;letter-spacing:0.05em;}
.logo span{color:var(--accent);}
.subtitle{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);}
.chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
.message{max-width:800px;width:100%;}
.message.user{align-self:flex-end;}
.message.assistant{align-self:flex-start;}
.bubble{padding:12px 16px;line-height:1.6;}
.user .bubble{background:var(--bg3);border:1px solid var(--border2);font-family:'IBM Plex Mono',monospace;font-size:13px;}
.assistant .bubble{background:var(--bg2);border:1px solid var(--border);font-size:14px;}
.assistant .bubble p{margin-bottom:8px;}
.assistant .bubble p:last-child{margin-bottom:0;}
.assistant .bubble code{font-family:'IBM Plex Mono',monospace;background:var(--bg3);padding:2px 6px;font-size:12px;color:var(--accent);}
.assistant .bubble pre{background:var(--bg3);border:1px solid var(--border2);padding:12px;margin:8px 0;overflow-x:auto;}
.assistant .bubble pre code{background:none;padding:0;}
.role-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:4px;padding:0 2px;}
.input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--bg2);}
.input-row{display:flex;gap:12px;max-width:800px;margin:0 auto;}
textarea{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);padding:12px;font-family:'IBM Plex Mono',monospace;font-size:13px;resize:none;height:52px;line-height:1.4;}
textarea:focus{outline:none;border-color:var(--accent);}
button{background:var(--accent);color:var(--bg);border:none;padding:0 24px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;cursor:pointer;height:52px;}
button:hover{background:var(--accent2);}
button:disabled{opacity:0.4;cursor:not-allowed;}
.typing{display:flex;gap:4px;padding:12px 16px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:bounce 1.2s infinite;}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.suggestions{display:flex;flex-wrap:wrap;gap:8px;max-width:800px;margin:0 auto 16px;}
.suggestion{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 12px;border:1px solid var(--border2);color:var(--text3);cursor:pointer;background:none;}
.suggestion:hover{border-color:var(--accent);color:var(--accent);}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border2);}
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">BENDEX<span>.</span>THEORY</div>
    <div class="subtitle" style="margin-top:2px;">Second-order Fisher manifold · Nine (2026)</div>
  </div>
  <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);" id="status">connecting...</div>
</header>
<div class="chat-area" id="chat">
  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="suggest(this)">What is τ* and why does it matter?</button>
    <button class="suggestion" onclick="suggest(this)">How is D(t) connected to the manifold?</button>
    <button class="suggestion" onclick="suggest(this)">Explain the dark matter ratio prediction</button>
    <button class="suggestion" onclick="suggest(this)">What is the Koide formula derivation?</button>
    <button class="suggestion" onclick="suggest(this)">How does Bendex Sentry use this theory?</button>
    <button class="suggestion" onclick="suggest(this)">What is the fine structure constant formula?</button>
  </div>
</div>
<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="Ask about the Bendex framework..." onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="send()">SEND →</button>
  </div>
</div>
<script>
const messages = [];
let thinking = false;

async function checkHealth(){
  try{
    const r = await fetch('/sentry/health');
    const d = await r.json();
    document.getElementById('status').textContent = 
      d.sentry?.status === 'ok' ? '● sentry connected' : '○ sentry offline';
    document.getElementById('status').style.color = 
      d.sentry?.status === 'ok' ? 'var(--accent)' : 'var(--text3)';
  }catch(e){
    document.getElementById('status').textContent = '○ offline';
  }
}

function suggest(btn){
  document.getElementById('input').value = btn.textContent;
  document.getElementById('suggestions').style.display = 'none';
  send();
}

function handleKey(e){
  if(e.key === 'Enter' && !e.shiftKey){e.preventDefault();send();}
}

function addMessage(role, content){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message ' + role;
  div.innerHTML = `<div class="role-label">${role === 'user' ? 'you' : 'bendex'}</div>
    <div class="bubble">${formatContent(content)}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function formatContent(text){
  // Basic markdown-like formatting
  return text
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>')
    .replace(/$/, '</p>');
}

function showTyping(){
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="role-label">bendex</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping(){
  const t = document.getElementById('typing-indicator');
  if(t) t.remove();
}

async function send(){
  if(thinking) return;
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text) return;

  input.value = '';
  document.getElementById('send-btn').disabled = true;
  document.getElementById('suggestions').style.display = 'none';
  thinking = true;

  messages.push({role: 'user', content: text});
  addMessage('user', text);
  showTyping();

  try{
    const r = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({messages, stream: false})
    });
    const d = await r.json();
    removeTyping();
    if(d.error){
      addMessage('assistant', 'Error: ' + JSON.stringify(d.error));
    } else {
      messages.push({role: 'assistant', content: d.response});
      addMessage('assistant', d.response);
    }
  }catch(e){
    removeTyping();
    addMessage('assistant', 'Connection error: ' + e.message);
  }

  thinking = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('input').focus();
}

checkHealth();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
